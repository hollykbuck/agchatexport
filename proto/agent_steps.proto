syntax = "proto3";

package agent.history;

option go_package = "github.com/hollykbuck/agchatexport/pb";

message Timestamp {
    int64 seconds = 1;
    int32 nanos = 2;
}

message ToolCallInfo {
    string call_id = 1;
    string tool_name = 2;
    string arguments_json = 3;
    // Fields 4-6 omitted as they are complex/unknown
    message NestedInfo {
        bytes data = 2;
    }
    NestedInfo nested = 7;
}

message TrajectoryInfo {
    string session_id = 1;
    int32 sequence_number = 2;
    int32 unknown_3 = 3;
    string cascade_id = 4;
}

message StepMetadata {
    Timestamp timestamp = 1;
    int32 some_enum = 3;
    ToolCallInfo tool_call = 4;
    // Field 5-11 observed but structure is complex
    string step_id = 12;
    TrajectoryInfo trajectory = 20;
    string tool_summary = 30;
    string tool_action = 31;
}

message UserMessage {
    string unknown_1 = 1;
    string text_content_2 = 2;
    message Content {
        string raw_text = 1;
    }
    Content nested_content_3 = 3;
    // Fields 4-18 omitted
}

message AssistantMessage {
    string text_content = 1;
    string bot_id = 6;
    message ToolDirective {
        string call_id = 1;
        string tool_name = 2;
        string args_json = 3;
    }
    ToolDirective tool_directive = 7;
    string thought_8 = 8;
    int32 unknown_12 = 12;
}

message ToolOutput {
    string key = 1;
    string content = 3;
}

message Step {
    int32 step_type = 1;
    int32 status = 4;
    StepMetadata metadata = 5;
    UserMessage user_message = 19;
    AssistantMessage assistant_message = 20;
    ToolOutput tool_output = 133;
}
